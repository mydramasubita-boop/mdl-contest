<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>My Drama Life — Memory</title>
<style>
  :root{
    --bg: #0a0708;
    --bg-soft: #16111a;
    --pink: #f2036f;
    --pink-glow: #ff4fa3;
    --gold: #ffd166;
    --white: #ffffff;
    --dim: #b9adc2;
    --ok: #2be08a;
    --bad: #ff5566;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; min-height:100%;
    background: radial-gradient(circle at 50% 0%, #201524 0%, var(--bg) 60%);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: var(--white);
    -webkit-tap-highlight-color: transparent;
    user-select:none;
  }
  .app{
    max-width: 520px;
    margin: 0 auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-bottom: 24px;
  }
  .header{
    width:100%;
    padding: 14px 18px 8px;
    text-align:center;
    border-bottom: 1px solid rgba(242,3,111,0.25);
    background: linear-gradient(180deg, rgba(242,3,111,0.10), transparent);
  }
  .brand{
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--pink-glow);
    text-transform: uppercase;
    margin-bottom: 2px;
    font-weight: 600;
  }
  .title{
    font-size: 20px;
    font-weight: 800;
    margin:0;
    background: linear-gradient(90deg, #fff, var(--pink-glow));
    -webkit-background-clip: text;
    background-clip:text;
    color: transparent;
    letter-spacing: 0.5px;
  }
  .hud{
    display:flex;
    justify-content: space-between;
    align-items:center;
    width: 100%;
    max-width: 420px;
    padding: 12px 6px 6px;
    font-size: 12.5px;
    color: var(--dim);
  }
  .hud b{ color: var(--gold); font-size:16px; }

  .timerbar-wrap{
    width: calc(100% - 24px);
    max-width: 420px;
    height: 6px;
    margin: 0 auto 14px;
    background: rgba(255,255,255,0.08);
    border-radius: 6px;
    overflow:hidden;
  }
  .timerbar{
    height:100%;
    width:100%;
    background: linear-gradient(90deg, var(--pink), var(--gold));
    transition: width 0.2s linear;
  }

  .board{
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    width: 100%;
    max-width: 420px;
    padding: 0 12px;
  }
  .card{
    aspect-ratio: 2 / 3;
    position:relative;
    perspective: 800px;
    cursor:pointer;
  }
  .card-inner{
    position:relative;
    width:100%; height:100%;
    transition: transform 0.5s cubic-bezier(0.4,0.2,0.2,1);
    transform-style: preserve-3d;
    border-radius: 8px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.5);
  }
  .card.flipped .card-inner{ transform: rotateY(180deg); }
  .card.matched .card-inner{ transform: rotateY(180deg); }
  .card.matched{ cursor:default; }
  .card-face{
    position:absolute;
    inset:0;
    backface-visibility: hidden;
    border-radius: 8px;
    overflow:hidden;
    border: 1.5px solid rgba(242,3,111,0.4);
  }
  .card-face img{
    width:100%; height:100%;
    object-fit: cover;
    display:block;
  }
  .card-back{ z-index:2; }
  .card-front{ transform: rotateY(180deg); }
  .card.matched .card-face{
    box-shadow: 0 0 10px 2px rgba(43,224,138,0.6);
    border-color: var(--ok);
  }

  .status-line{
    margin-top: 16px;
    font-size: 13px;
    color: var(--dim);
    min-height: 18px;
  }

  .final-panel{
    margin-top: 18px;
    width: calc(100% - 24px);
    max-width: 400px;
    background: var(--bg-soft);
    border: 1px solid rgba(242,3,111,0.3);
    border-radius: 16px;
    padding: 18px;
    text-align:center;
    display:none;
  }
  .final-panel.show{ display:block; }
  .final-title{
    font-size: 14px;
    font-weight:700;
    color: var(--white);
    margin-bottom: 6px;
  }
  .final-score{
    font-size: 40px;
    font-weight: 900;
    color: var(--gold);
    line-height:1;
  }
  .final-score span{
    font-size: 13px;
    color: var(--dim);
    font-weight:600;
  }
  .final-breakdown{
    display:flex;
    justify-content:center;
    gap: 20px;
    font-size: 12px;
    color: var(--dim);
    margin-top: 8px;
  }
  .final-breakdown b{ color: var(--white); display:block; font-size:14px; }
  .confirm-btn{
    margin-top: 14px;
    border:none;
    padding: 13px 26px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 700;
    cursor:pointer;
    background: linear-gradient(90deg, #2be08a, #159a5f);
    color: #fff;
    box-shadow: 0 4px 16px rgba(43,224,138,0.35);
  }
  .fail-score{
    font-size: 34px;
    font-weight: 900;
    color: var(--bad);
  }
  .submitted-note{
    margin-top: 10px;
    color: var(--ok);
    font-size: 13px;
    font-weight:600;
    display:none;
  }
  .submitted-note.show{ display:block; }

  .start-overlay{
    position:fixed; inset:0;
    background: rgba(6,4,7,0.94);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    text-align:center;
    padding: 24px;
    gap: 14px;
    z-index: 20;
  }
  .start-overlay h2{
    margin:0;
    font-size: 22px;
    background: linear-gradient(90deg, #fff, var(--pink-glow));
    -webkit-background-clip: text; background-clip:text; color:transparent;
  }
  .start-overlay p{
    margin:0;
    color: var(--dim);
    font-size: 13.5px;
    line-height: 1.5;
    max-width: 320px;
  }
  .btn{
    border:none;
    padding: 13px 30px;
    border-radius: 999px;
    font-size: 15px;
    font-weight: 700;
    cursor:pointer;
    background: linear-gradient(90deg, var(--pink), #c2025a);
    color: #fff;
    box-shadow: 0 4px 20px rgba(242,3,111,0.45);
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="brand">My Drama Life · Missione Compleanno</div>
    <h1 class="title">Memory</h1>
  </div>

  <div class="hud">
    <div>Coppie: <b id="pairsFound">0</b> / 8</div>
    <div id="timeDisplay">1:45</div>
  </div>
  <div class="timerbar-wrap"><div class="timerbar" id="timerbar"></div></div>

  <div class="board" id="board"></div>

  <div class="status-line" id="statusLine"></div>

  <div class="final-panel" id="finalPanel"></div>

  <div class="start-overlay" id="startOverlay">
    <div class="brand">Missione 4</div>
    <h2>Trova tutte le coppie</h2>
    <p>16 carte, 8 coppie di locandine da abbinare. Hai 1 minuto e 45 secondi: se scade il tempo prima di completare, la missione va persa (0 punti). Ad ogni partita le carte vengono rimescolate.</p>
    <button class="btn" onclick="startGame()">Inizia</button>
  </div>
</div>

const GAME_DURATION = 105; // seconds (1:45)
const BASE_POINTS = 70;
const BONUS_MAX = 30;

const pairKeys = ['Memory_1','Memory_2','Memory_3','Memory_4','Memory_5','Memory_6','Memory_7','Memory_8'];

let board = [];
let firstCard = null, secondCard = null;
let lock = false;
let pairsFound = 0;
let timeLeft = GAME_DURATION;
let timerInterval = null;
let gameActive = false;

const boardEl = document.getElementById('board');
const pairsFoundEl = document.getElementById('pairsFound');
const timeDisplayEl = document.getElementById('timeDisplay');
const timerbarEl = document.getElementById('timerbar');
const statusLine = document.getElementById('statusLine');
const finalPanel = document.getElementById('finalPanel');

function shuffle(arr){
  for(let i = arr.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function buildBoard(){
  boardEl.innerHTML = '';
  const deck = shuffle([...pairKeys, ...pairKeys]);
  board = deck.map((key, idx) => ({ key, idx, matched: false }));

  board.forEach((cell, idx) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.idx = idx;
    card.innerHTML = `
      <div class="card-inner">
        <div class="card-face card-back"><img src="${ASSETS['retro_memory']}" alt="retro"></div>
        <div class="card-face card-front"><img src="${ASSETS[cell.key]}" alt="carta"></div>
      </div>
    `;
    card.addEventListener('click', () => onCardClick(card, cell));
    boardEl.appendChild(card);
  });
}

function onCardClick(cardEl, cell){
  if(!gameActive || lock || cell.matched) return;
  if(firstCard && firstCard.cell.idx === cell.idx) return;

  cardEl.classList.add('flipped');

  if(!firstCard){
    firstCard = { el: cardEl, cell };
    return;
  }

  secondCard = { el: cardEl, cell };
  lock = true;

  if(firstCard.cell.key === secondCard.cell.key){
    firstCard.cell.matched = true;
    secondCard.cell.matched = true;
    firstCard.el.classList.add('matched');
    secondCard.el.classList.add('matched');
    pairsFound++;
    pairsFoundEl.textContent = pairsFound;
    firstCard = null; secondCard = null; lock = false;

    if(pairsFound === pairKeys.length){
      finishGame(true);
    }
  } else {
    setTimeout(() => {
      firstCard.el.classList.remove('flipped');
      secondCard.el.classList.remove('flipped');
      firstCard = null; secondCard = null; lock = false;
    }, 800);
  }
}

function startGame(){
  document.getElementById('startOverlay').style.display = 'none';
  finalPanel.classList.remove('show');
  finalPanel.innerHTML = '';
  statusLine.textContent = '';
  pairsFound = 0;
  pairsFoundEl.textContent = '0';
  timeLeft = GAME_DURATION;
  firstCard = null; secondCard = null; lock = false;
  gameActive = true;

  buildBoard();
  updateTimerDisplay();

  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft -= 0.1;
    if(timeLeft <= 0){
      timeLeft = 0;
      updateTimerDisplay();
      clearInterval(timerInterval);
      finishGame(false);
      return;
    }
    updateTimerDisplay();
  }, 100);
}

function updateTimerDisplay(){
  const secs = Math.max(timeLeft, 0);
  const m = Math.floor(secs / 60);
  const s = Math.floor(secs % 60);
  timeDisplayEl.textContent = m + ':' + String(s).padStart(2,'0');
  timerbarEl.style.width = (secs / GAME_DURATION * 100) + '%';
}

function finishGame(success){
  gameActive = false;
  clearInterval(timerInterval);
  lock = true;

  if(success){
    const elapsedRatio = 1 - (timeLeft / GAME_DURATION);
    const speedRatio = Math.max(0, 1 - elapsedRatio); // more time left = higher bonus
    const bonus = Math.round(BONUS_MAX * (timeLeft / GAME_DURATION));
    const total = BASE_POINTS + bonus;

    finalPanel.innerHTML = `
      <div class="brand">Missione completata</div>
      <div class="final-score">${total}<span> / 100 punti</span></div>
      <div class="final-breakdown">
        <div>Base<b>${BASE_POINTS}</b></div>
        <div>Bonus velocità<b>+${bonus}</b></div>
      </div>
      <button class="confirm-btn" id="confirmBtn">Conferma e invia i punti per il contest</button>
      <p class="submitted-note" id="submittedNote">Punteggio inviato per il contest ✓</p>
    `;
  } else {
    finalPanel.innerHTML = `
      <div class="brand">Tempo scaduto</div>
      <div class="fail-score">0 <span style="font-size:13px;color:var(--dim);font-weight:600;">/ 100 punti</span></div>
      <p style="color:var(--dim); font-size:13px; margin-top:8px;">Non hai completato tutte le coppie in tempo. Questa missione va persa, si passa a quella successiva.</p>
      <button class="confirm-btn" id="confirmBtn">Conferma e invia i punti per il contest</button>
      <p class="submitted-note" id="submittedNote">Punteggio inviato per il contest ✓</p>
    `;
  }

  finalPanel.classList.add('show');
  document.getElementById('confirmBtn').addEventListener('click', () => {
    document.getElementById('confirmBtn').style.display = 'none';
    document.getElementById('submittedNote').classList.add('show');
  });
}
</script>
